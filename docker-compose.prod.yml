services:
  web:
    image: philippemlaroche/elvea64-app:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8095:80"   # exposé uniquement en local, Apache fait le proxy
    volumes:
      - /srv/elvea64/data:/var/www/data              # base SQLite persistante
      - /srv/elvea64/media:/var/www/html/media       # uploads persistants
      - /srv/elvea64/files_upload:/var/www/files_upload # fichiers utilisateurs
